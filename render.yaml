services:
  - type: cron
    name: collecting-draw-results
    runtime: node
    schedule: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false          # 在 Render Dashboard 中手动填写，如 mongodb+srv://...
      - key: NODE_ENV
        value: production
